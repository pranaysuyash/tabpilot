name: CI

on:
  push:
    branches: [ "master", "main", "codex/**" ]
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Swift build
        run: swift build

      - name: Swift test (with coverage)
        run: swift test --enable-code-coverage

      - name: Security test pipeline
        run: make security-test

      - name: Performance benchmark
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: swift test --filter PerformanceTests

      - name: Upload coverage raw data
        if: always()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808
        with:
          name: swift-code-coverage-raw
          path: .build/debug/codecov
          if-no-files-found: warn
